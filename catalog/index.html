<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AnglerBook — Gear catalog</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#16543C">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<meta http-equiv="refresh" content="0; url=https://glysk-ou.github.io/AnglerBook/">
<link rel="stylesheet" href="../assets/style.css">
<style>
  .redir { min-height: 100svh; display: grid; place-items: center; text-align: center; }
  .redir .crest { width: 96px; margin: 0 auto 22px; }
  .redir h1 { font-family: var(--display); font-weight: 800; text-transform: uppercase; font-size: clamp(1.8rem,6vw,2.6rem); margin: 0 0 10px; }
  .redir p { color: var(--ink-soft); margin: 0 0 18px; }
</style>
</head>
<body>
<main class="redir">
  <div class="wrap">
    <svg class="crest" viewBox="0 0 200 240" aria-hidden="true">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16543C"/><stop offset="1" stop-color="#0A2C20"/></linearGradient>
        <clipPath id="c"><path d="M40,24 H160 a16,16 0 0 1 16,16 V118 C176,168 150,196 100,214 C50,196 24,168 24,118 V40 a16,16 0 0 1 16,-16 Z"/></clipPath>
      </defs>
      <path d="M40,24 H160 a16,16 0 0 1 16,16 V118 C176,168 150,196 100,214 C50,196 24,168 24,118 V40 a16,16 0 0 1 16,-16 Z" fill="url(#g)"/>
      <g clip-path="url(#c)">
        <path d="M0,150 q30,-12 60,0 t60,0 t60,0 t60,0" fill="none" stroke="#F7F2E6" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
        <path d="M0,166 q30,-12 60,0 t60,0 t60,0 t60,0" fill="none" stroke="#5E7C8A" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
      </g>
    </svg>
    <h1>Taking you to the gear catalog</h1>
    <p>The AnglerBook gear archive is hosted on GitHub.</p>
    <p><a id="link" href="https://glysk-ou.github.io/AnglerBook/">Open the gear catalog &rarr;</a></p>
  </div>
</main>
<script>
  location.replace(document.getElementById('link').href);
</script>
</body>
</html>
